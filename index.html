<script>
// ========== STATE ==========
const state = {
  screen: 'presentation',
  timerStarted: false,
  timeLeft: 35 * 60,
  timerInterval: null,
  startTime: null,
  timeOut: false,
  errors: 0,

  // Room 3

  r4Stage: 1,
  r4Cells: null,
  r4Conventional: 1000,
  r4Precision: 350,
  // Room 5

};

let draggedItem = null;

// ========== SOUND ==========
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    if (type === 'click') {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle'; o.frequency.value = 600;
      g.gain.setValueAtTime(0.05, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      o.start(now); o.stop(now + 0.1);
    } else if (type === 'pickup') {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = 800;
      g.gain.setValueAtTime(0.06, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      o.start(now); o.stop(now + 0.15);
    } else if (type === 'drop') {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(400, now);
      o.frequency.exponentialRampToValueAtTime(200, now + 0.1);
      g.gain.setValueAtTime(0.08, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      o.start(now); o.stop(now + 0.15);
    } else if (type === 'success') {
      [523, 659, 784].forEach((f, i) => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.1, now + i * 0.08);
        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
        o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.3);
      });
    } else if (type === 'error') {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180, now);
      o.frequency.linearRampToValueAtTime(140, now + 0.2);
      g.gain.setValueAtTime(0.08, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      o.start(now); o.stop(now + 0.3);
    } else if (type === 'water') {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(500, now);
      o.frequency.exponentialRampToValueAtTime(800, now + 0.15);
      o.frequency.exponentialRampToValueAtTime(400, now + 0.3);
      g.gain.setValueAtTime(0.07, now);
      g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      o.start(now); o.stop(now + 0.4);
    } else if (type === 'roomComplete') {
      [523, 659, 784, 1046].forEach((f, i) => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.1, now + i * 0.1);
        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.5);
        o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.5);
      });
    } else if (type === 'victory') {
      [523, 659, 784, 1046, 1318, 1568].forEach((f, i) => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle'; o.frequency.value = f;
        g.gain.setValueAtTime(0.12, now + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.7);
        o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.7);
      });
    }
  } catch(e) {}
}

// ========== TIMER ==========
function startTimer() {
  if (state.timerStarted) return;
  state.timerStarted = true;
  state.startTime = Date.now();
  state.timerInterval = setInterval(() => {
    state.timeLeft = Math.max(0, state.timeLeft - 1);
    updateTimer();
    if (state.timeLeft === 0 && !state.timeOut) {
      state.timeOut = true;
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      showTimeOutOverlay();
    }
  }, 1000);
  updateTimer();
}

function showTimeOutOverlay() {

function dismissTimeOutOverlay() {
  try { playSound('click'); } catch(e) {}
  const ov = document.getElementById('timeOutOverlay');
  if (ov) ov.remove();
}

function updateTimer() {
  const m = Math.floor(state.timeLeft / 60);
  const s = state.timeLeft % 60;
  const danger = state.timeLeft < 5 * 60;
  const display = document.getElementById('timerDisplay');
  const icon = document.getElementById('timerIcon');
  if (display) {
    display.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    display.style.color = danger ? '#ffb4ab' : '#bffb33';
    if (danger) display.classList.add('animate-pulse'); else display.classList.remove('animate-pulse');
  }
  if (icon) icon.style.color = danger ? '#ffb4ab' : '#bffb33';
}

function updateProgressDots() {
  const container = document.getElementById('progressDots');
  if (!container) return;
  const currentIdx = ({room1: 0, room2: 1, room3: 2, room4: 3, room5: 4})[state.screen];
  if (currentIdx === undefined) { container.innerHTML = ''; return; }

  let html = '';
  for (let i = 0; i < 5; i++) {
    const isActive = i <= currentIdx;
    const color = isActive ? '#bffb33' : '#434934';
    const shadow = isActive ? '0 0 10px rgba(191, 251, 51, 0.6)' : 'none';
    const opacity = isActive ? 1 : 0.3;
    html += '<div class="w-2.5 h-2.5 rounded-full transition-all" style="background:' + color + ';box-shadow:' + shadow + ';opacity:' + opacity + ';"></div>';
  }
  container.innerHTML = html;
}

// ========== TRANSITIONS ==========
function transition(nextScreen, text) {
  try { playSound('roomComplete'); } catch(e) {}
  const overlay = document.createElement('div');
  overlay.className = 'transition-overlay';
  overlay.innerHTML = '<div class="text-3xl md:text-5xl font-display font-bold animate-pulse mb-4 text-center px-4" style="color:#bffb33;">' + text + '</div><div class="w-64 h-2 bg-slate-800 rounded overflow-hidden"><div class="h-full" style="background:#bffb33;animation:growBar 1.5s ease-out forwards;"></div></div>';
  document.body.appendChild(overlay);
  setTimeout(() => {
    overlay.remove();
    goToScreen(nextScreen);
  }, 1800);
}

function goToScreen(screen) {
  state.screen = screen;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateProgressDots();
  const c = document.getElementById('screenContainer');
  c.innerHTML = '';

  if (screen === 'presentation') renderPresentation();
  else if (screen === 'video') renderVideo();
  else if (screen === 'team-input') renderTeamInput();
  else if (screen === 'briefing') renderBriefing();
  else if (screen === 'certificate') renderCertificate();
  else if (screen === 'room1') renderRoom1();
  else if (screen === 'room2') renderRoom2();
  else if (screen === 'room3') renderRoom3();
  else if (screen === 'room4') renderRoom4();
  else if (screen === 'room5') renderRoom5();
  else if (screen === 'victory') renderVictory();
}

function r1DragStart(e, id) {
  draggedItem = id;
  if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
  playSound('pickup');
}

function r1AddItem(id) {
  if (state.r1Cart.includes(id)) return;
  state.r1Cart.push(id);
  playSound('drop');
  r1UpdateUI();
}

function r1Drop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  if (draggedItem && !state.r1Cart.includes(draggedItem)) {
    r1AddItem(draggedItem);
  }
  draggedItem = null;
}

function r1RemoveItem(id) {
  state.r1Cart = state.r1Cart.filter(x => x !== id);
  playSound('click');
  r1UpdateUI();
}

function r1UpdateUI() {
  if (state.r1Stage !== 'cart') return;

  const totalWater = state.r1Cart.reduce((s, id) => s + r1Items.find(i => i.id === id).water, 0);
  const totalCo2 = state.r1Cart.reduce((s, id) => s + r1Items.find(i => i.id === id).co2, 0);
  document.getElementById('r1WaterTotal').textContent = totalWater.toLocaleString();
  document.getElementById('r1Co2Total').textContent = totalCo2;
  document.getElementById('r1WaterFill').style.width = Math.min(100, (totalWater / R1_TOTAL_WATER) * 100) + '%';
  document.getElementById('r1Co2Fill').style.width = Math.min(100, (totalCo2 / R1_TOTAL_CO2) * 100) + '%';

  document.getElementById('r1ItemsBank').innerHTML = r1ItemsHTML();

  const cart = document.getElementById('r1Cart');
  if (state.r1Cart.length === 0) {
    cart.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-center py-12"><span class="material-symbols-outlined text-7xl opacity-40" style="color:#ffb4ab;">shopping_cart</span><p class="mt-3 text-sm md:text-base" style="color:#c3caae;">גררו פריטים לכאן</p><p class="text-xs mt-1" style="color:#8d947b;">(או הקליקו במובייל)</p></div>';
  } else {
    let html = '<div class="space-y-2">';
    state.r1Cart.forEach(id => {
      const item = r1Items.find(i => i.id === id);
      html += `
        <div class="animate-scaleIn glass-panel rounded-lg p-3 flex items-center gap-3" style="border-right:3px solid ${item.color};">
          <div class="text-3xl">${item.emoji}</div>
          <div class="flex-1">
            <div class="font-bold text-sm" style="color:#e1e4d1;">${item.name}</div>
            <div class="font-mono text-xs" dir="ltr" style="color:#c3caae;">${item.water.toLocaleString()}L · ${item.co2}kg CO₂</div>
          </div>
          <button onclick="r1RemoveItem('${id}')" class="opacity-60 hover:opacity-100 transition-opacity" style="color:#ffb4ab;">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      `;
    });
    if (state.r1Cart.length < 3) {
      html += `<div class="text-center text-xs mt-3" style="color:#c3caae;">עוד <span class="font-mono" dir="ltr">${3 - state.r1Cart.length}</span> פריטים נדרשים...</div>`;
    }
    html += '</div>';
    cart.innerHTML = html;
  }

  // Show "stock-out" notification when all 3 items in cart
  const advance = document.getElementById('r1AdvanceContainer');
  if (state.r1Cart.length === 3) {
    playSound('error');
    advance.innerHTML = `
      <div class="animate-scaleIn glass-strong rounded-xl p-5 md:p-6 mb-4 border-2" style="border-color:#ffa62b;background:linear-gradient(135deg,rgba(255,166,43,0.1),rgba(255,180,171,0.05));">
        <div class="flex items-start gap-3 mb-4">
          <span class="material-symbols-outlined filled text-3xl animate-pulse" style="color:#ffa62b;">inventory_2</span>
          <div class="flex-1">
            <div class="font-display font-bold text-base md:text-lg mb-1" style="color:#ffa62b;">עדכון מלאי - הזמנה מ-Shein</div>
            <p class="text-sm md:text-base leading-relaxed" style="color:#e1e4d1;">
              <span class="font-bold" style="color:#ffa62b;">2 פריטים שהזמנת אזלו מהמלאי</span> ולא יישלחו: <span style="text-decoration:line-through;opacity:0.7;">שמלה 👗, מכנסיים 👖</span>
            </p>
            <p class="text-sm md:text-base mt-2" style="color:#c3caae;">
              הפריט שיגיע אליך: <span class="font-bold" style="color:#76d4ea;">חולצה 👕</span>
            </p>
          </div>
        </div>
        <div class="border-t pt-4 mt-3" style="border-color:rgba(255,166,43,0.2);">
          <p class="text-sm md:text-base mb-3" style="color:#c3caae;">
            כדי לפתוח את החדר הבא - חשבו את <span class="font-bold" style="color:#bffb33;">קוד טביעת הרגל</span> עבור החולצה.
          </p>
          <button onclick="r1AdvanceToCalculate()" class="w-full px-6 md:px-8 py-3 md:py-4 eco-gradient font-bold rounded-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 text-base md:text-lg glow-strong" style="color:#445e00;">
            <span>המשך לפיצוח הקוד</span>
            <span class="material-symbols-outlined filled">key</span>
          </button>
        </div>
      </div>
    `;
  } else {
    advance.innerHTML = '';
  }
}

function r1BackToCart() {
  playSound('click');
  state.r1Stage = 'cart';
  r1RenderStageCart();
  setTimeout(() => r1UpdateUI(), 50);
}

function r1ValidateCode() {
  const code = parseInt(document.getElementById('r1InputCode').value, 10);
  const codeOk = code === R1_CODE;
  const codeField = document.getElementById('r1Q3');

  const feedback = document.getElementById('r1Feedback');

  if (codeOk) {
    playSound('success');
    codeField.style.borderColor = '#bffb33';
    codeField.style.boxShadow = '0 0 25px rgba(191,251,51,0.5)';
    feedback.innerHTML = `
      <div class="animate-success glass-strong rounded-xl p-4 md:p-5 border-2" style="border-color:#bffb33;background:rgba(191,251,51,0.08);">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined filled text-3xl" style="color:#bffb33;">check_circle</span>
          <div class="flex-1">
            <div class="font-bold text-base md:text-lg" style="color:#bffb33;">קוד פוענח בהצלחה!</div>
            <div class="text-sm md:text-base" style="color:#c3caae;">
              <span class="font-mono font-bold" dir="ltr" style="color:#bffb33;">${R1_SHIRT_WATER.toLocaleString()} ÷ ${R1_SHIRT_CO2} = ${R1_CODE}</span>
            </div>
          </div>
        </div>
      </div>
    `;
    document.getElementById('r1ValidateBtn').disabled = true;
    document.getElementById('r1ValidateBtn').style.opacity = '0.5';
    setTimeout(() => r1AdvanceToReveal(), 1400);
    return;
  }

  // Wrong - generate hint
  state.r1Attempts++;
  playSound('error');
  if (!isNaN(code)) {
    codeField.style.borderColor = '#ffb4ab';
    codeField.style.boxShadow = '0 0 15px rgba(255,180,171,0.4)';
  }
  document.querySelectorAll('#r1Q3, #r1ValidateBtn').forEach(el => {
    el.classList.add('animate-shake');
    setTimeout(() => el.classList.remove('animate-shake'), 500);
  });

  let hintHTML = '';
  if (state.r1Attempts < 2) {
    // Basic hint - first attempt
    let msg = 'בדקו את החישוב שוב.';
    if (isNaN(code)) msg = 'הזינו תוצאה מספרית בתיבה.';
    else if (code === R1_SHIRT_WATER * R1_SHIRT_CO2) msg = 'שימו לב - זה חילוק (÷) ולא כפל.';
    else if (code === R1_SHIRT_WATER + R1_SHIRT_CO2) msg = 'זה לא חיבור - זה חילוק (÷).';
    else if (code === R1_SHIRT_WATER - R1_SHIRT_CO2) msg = 'זה לא חיסור - זה חילוק (÷).';

    hintHTML = `
      <div class="animate-scaleIn glass-strong rounded-xl p-4 md:p-5 border-2" style="border-color:#ffb4ab;background:rgba(255,180,171,0.08);">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined filled text-2xl" style="color:#ffb4ab;">error</span>

// === BEACH VIEW (live, responsive to state) ===
function r2GetUsedBudget() {
  return r2Actions.filter(a => state.r2Actions[a.id]).reduce((sum, a) => sum + a.cost, 0);
}

function r2GetCurrentImpact() {
  return r2Actions.filter(a => state.r2Actions[a.id]).reduce((sum, a) => sum + a.impact, 0);
}

function r2GetSeaLevel() {
  if (state.r2Stage === 'chain') {
    // Sea rises gradually with each unlocked node (visible cause-effect)
    const filled = Object.values(state.r2NodesCorrect).filter(v => v).length;
    // 0 nodes: calm (22%), 1: rising (35%), 2: concerning (50%), 3: critical (70%)
    return [22, 35, 50, 70][filled];
  }
  if (state.r2Stage === 'transition') return 70;
  // Stage 'console' - chain is active, console actions reduce sea level
  const impact = r2GetCurrentImpact();
  return Math.max(22, 70 - (impact / 100) * 48);
}

function r2GetClimateStatus() {
  if (state.r2Stage === 'chain') {
    const filled = Object.values(state.r2NodesCorrect).filter(v => v).length;
    if (filled === 0) return { label: 'תקין', color: '#76d4ea', bg: 'rgba(118,212,234,0.15)' };
    if (filled === 1) return { label: 'אזהרה', color: '#ffa62b', bg: 'rgba(255,166,43,0.15)' };
    if (filled === 2) return { label: 'בסכנה', color: '#ff8c5a', bg: 'rgba(255,140,90,0.15)' };
    return { label: 'קריטי', color: '#ffb4ab', bg: 'rgba(255,180,171,0.15)' };
  }
  if (state.r2Stage === 'transition') return { label: 'קריטי', color: '#ffb4ab', bg: 'rgba(255,180,171,0.15)' };
  // Console stage
  const impact = r2GetCurrentImpact();
  if (impact >= 70) return { label: 'ניצל', color: '#bffb33', bg: 'rgba(191,251,51,0.15)' };
  if (impact >= 50) return { label: 'יציב', color: '#76d4ea', bg: 'rgba(118,212,234,0.15)' };
  if (impact >= 30) return { label: 'בסכנה', color: '#ffa62b', bg: 'rgba(255,166,43,0.15)' };
  return { label: 'הוצף', color: '#ffb4ab', bg: 'rgba(255,180,171,0.15)' };
}

function r2BeachView() {
  const seaLevel = r2GetSeaLevel();
  const status = r2GetClimateStatus();
  // Calculate "danger level" 0-1 based on stage and progress
  let danger = 0;
  if (state.r2Stage === 'chain') {
    const filled = Object.values(state.r2NodesCorrect).filter(v => v).length;
    danger = filled / 3; // 0, 0.33, 0.66, 1.0
  } else if (state.r2Stage === 'transition') {
    danger = 1;
  } else {
    // Console stage: danger reduces with impact
    const impact = r2GetCurrentImpact();
    danger = Math.max(0, 1 - impact / 100);
  }

  // Interpolate sky colors based on danger
  const skyTopR = Math.round(135 + danger * (-15));  // 135 -> 120
  const skyTopG = Math.round(180 + danger * (-100)); // 180 -> 80
  const skyTopB = Math.round(210 + danger * (-150)); // 210 -> 60
  const skyBotR = Math.round(40 + danger * (140));   // 40 -> 180
  const skyBotG = Math.round(90 + danger * (0));     // 90 -> 90
  const skyBotB = Math.round(140 + danger * (-70));  // 140 -> 70

  const skyTop = `${skyTopR},${skyTopG},${skyTopB}`;
  const skyBot = `${skyBotR},${skyBotG},${skyBotB}`;
  const sunColor = danger > 0.5 ? '#ff5722' : (danger > 0.2 ? '#ffa726' : '#ffd54f');
  const sunGlow = danger > 0.5 ? '#ff8a50' : (danger > 0.2 ? '#ffb74d' : '#ffeb3b');
  const chainActive = danger >= 0.5; // For cloud display

  return `
    <div class="relative w-full rounded-xl overflow-hidden border-2 transition-all" style="border-color:${status.color};box-shadow:0 0 25px ${status.color}33;height:200px;">
      <div class="absolute inset-0 transition-all duration-700"
           style="background:linear-gradient(to bottom,rgba(${skyTop},0.95) 0%,rgba(${skyBot},0.95) 100%);"></div>

      <div class="absolute transition-all duration-700"
           style="top:14px;left:75%;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,${sunColor},${sunGlow}cc);box-shadow:0 0 30px ${sunGlow};"></div>

      ${chainActive ? `
        <div class="absolute" style="top:30px;right:15%;font-size:24px;opacity:0.7;animation:pulse-glow 2s infinite;">☁️</div>
        <div class="absolute" style="top:50px;right:35%;font-size:18px;opacity:0.6;">☁️</div>
      ` : `
        <div class="absolute" style="top:30px;right:15%;font-size:20px;opacity:0.4;">☁️</div>
      `}

      <div class="absolute bottom-0 left-0 right-0 transition-all duration-700"
           style="height:${seaLevel}%;background:linear-gradient(to top,rgba(0,40,80,0.95),rgba(${chainActive ? '60,40,30' : '0,90,140'},0.7));overflow:hidden;">
        <div class="absolute top-0 left-0 right-0" style="height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);animation:shimmer 3s linear infinite;"></div>
        <div class="absolute top-2 left-0 right-0" style="height:1px;background:rgba(255,255,255,0.3);"></div>
      </div>

      <div class="absolute" style="bottom:${Math.max(0, seaLevel - 8)}%;left:10%;width:80%;height:12px;background:linear-gradient(to bottom,#d4a574,#a87b4a);opacity:${seaLevel > 55 ? 0.4 : 1};transition:opacity 0.5s;"></div>

      <div class="absolute transition-all duration-700" style="bottom:${Math.max(2, seaLevel - 5)}%;left:38%;font-size:32px;${seaLevel > 50 ? 'opacity:0.5;filter:grayscale(0.5);' : ''}">🏫</div>

      <div class="absolute top-2 right-2 px-2 py-1 rounded font-mono text-[10px] md:text-xs glass-panel" style="color:${status.color};">חוף הכרמל</div>

      <div class="absolute top-2 left-2 flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] md:text-xs font-bold" style="background:${status.bg};color:${status.color};border:1px solid ${status.color}66;">

        SEA LEVEL: ${Math.round(seaLevel)}%
      </div>
    </div>
  `;
}

  const animClass = isJustUnlocked ? 'animate-nodeUnlock' : (isActive ? 'animate-pulse-glow' : '');

         class="r2-node relative rounded-xl p-3 md:p-4 border-2 transition-all flex flex-col items-center justify-center text-center ${animClass}"
         style="${baseStyle}${cursorAttr};min-height:90px;">
      ${isJustUnlocked ? '<div class="absolute -top-3 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-full text-[10px] font-bold animate-pulse" style="background:#bffb33;color:#003640;white-space:nowrap;">✓ נפתח!</div>' : ''}
      <div class="text-3xl md:text-4xl mb-1 ${chainComplete && isFilled ? 'animate-pulse' : ''}" style="${isFilled ? '' : 'opacity:0.3;'}">${isFilled ? node.emoji : '❓'}</div>
      <div class="text-[10px] md:text-xs font-bold leading-tight" style="color:${isFilled ? node.color : '#ffb4ab'};">
        ${isFilled ? node.short : 'לחצו לפענוח'}
      </div>
      <div class="absolute -top-2 -right-2 w-6 h-6 rounded-full flex items-center justify-center text-xs font-mono font-bold" style="background:${isFilled ? node.color : '#434934'};color:${isFilled ? '#003640' : '#8d947b'};">${idx + 1}</div>
    </div>
  `;
}

function r2ChainConnector(idx) {
  const leftNode = r2Chain[idx];
  const rightNode = r2Chain[idx + 1];
  const leftFilled = leftNode.filled || state.r2NodesCorrect[leftNode.id];
  const rightFilled = rightNode.filled || state.r2NodesCorrect[rightNode.id];
  const active = leftFilled && rightFilled;
  const chainComplete = state.r2Stage !== 'chain';

  const color = active ? (chainComplete ? '#bffb33' : '#76d4ea') : '#434934';
  const flowAnim = chainComplete && active ? 'animation:shimmer 2s linear infinite;' : '';

  return `
    <div class="hidden md:flex flex-1 items-center justify-center px-1">
      <div class="relative h-1 w-full rounded-full overflow-hidden" style="background:#1d2115;">
        <div class="absolute inset-0 transition-all duration-500" style="background:linear-gradient(90deg,transparent,${color},transparent);${flowAnim}"></div>
      </div>
    </div>
    <div class="flex md:hidden justify-center w-full py-1">
      <span class="material-symbols-outlined" style="color:${color};">arrow_downward</span>
    </div>
  `;
}

function r2RenderChainSection() {
  let html = '<div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr_auto_1fr_auto_1fr_auto_1fr] gap-2 md:gap-1 items-center">';
  r2Chain.forEach((node, idx) => {
    html += r2ChainNodeHTML(node, idx);
    if (idx < r2Chain.length - 1) {
      html += r2ChainConnector(idx);
    }
  });
  html += '</div>';
  return html;
}

// === QUESTION MODAL ===
function r2RenderQuestion() {
  if (state.r2ActiveQuestion === null) return '';
  const node = r2Chain.find(n => n.id === state.r2ActiveQuestion);
  if (!node) return '';

  return `
    <div class="animate-scaleIn glass-strong rounded-xl p-5 md:p-6 mb-4 border-2 mt-4" style="border-color:${node.color};background:linear-gradient(135deg,rgba(118,212,234,0.06),transparent);">
      <div class="flex items-start gap-3 mb-4">
        <div class="text-3xl md:text-4xl">${node.emoji}</div>
        <div class="flex-1">
          <div class="text-xs font-mono mb-1" dir="ltr" style="color:${node.color};">NODE ${node.id} / DECRYPT</div>
          <div class="font-display font-bold text-base md:text-lg leading-tight" style="color:#e1e4d1;">${node.question}</div>
        </div>
        <button onclick="r2CloseQuestion()" class="opacity-60 hover:opacity-100" style="color:#c3caae;">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="space-y-2.5">
        ${node.options.map((opt, idx) => `
          <button onclick="r2AnswerQuestion(${node.id}, ${idx})"
            class="w-full text-right px-4 py-3 rounded-lg border-2 transition-all hover:scale-[1.01] active:scale-[0.99] flex items-center gap-3"
            style="background:rgba(25,29,17,0.8);border-color:rgba(141,148,123,0.3);color:#e1e4d1;"
            onmouseover="this.style.borderColor='${node.color}';this.style.background='rgba(118,212,234,0.08)';"
            onmouseout="this.style.borderColor='rgba(141,148,123,0.3)';this.style.background='rgba(25,29,17,0.8)';">
            <span class="font-mono font-bold rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0" style="background:rgba(118,212,234,0.15);color:${node.color};">${String.fromCharCode(1488 + idx)}</span>
            <span class="text-sm md:text-base flex-1">${opt.text}</span>
          </button>
        `).join('')}
      </div>

      <div id="r2QFeedback" class="mt-3"></div>
    </div>
  `;
}

function r2OpenQuestion(nodeId) {
  if (state.r2NodesCorrect[nodeId]) return;
  playSound('click');
  state.r2ActiveQuestion = nodeId;
  r2Render();
}

function r2CloseQuestion() {
  playSound('click');
  state.r2ActiveQuestion = null;
  r2Render();
}

function r2AnswerQuestion(nodeId, optionIdx) {
  const node = r2Chain.find(n => n.id === nodeId);
  const option = node.options[optionIdx];
  const fb = document.getElementById('r2QFeedback');

  if (option.correct) {
    playSound('success');
    state.r2NodesCorrect[nodeId] = true;
    fb.innerHTML = `
      <div class="animate-success p-3 rounded-lg flex items-start gap-2 mt-2" style="background:rgba(191,251,51,0.1);border:1px solid rgba(191,251,51,0.4);color:#bffb33;">
        <span class="material-symbols-outlined filled flex-shrink-0">check_circle</span>
        <div class="text-sm md:text-base">
          <span class="font-bold">נכון! הצומת נפתח בשרשרת ⬆️</span>
          <div class="mt-1 text-xs md:text-sm" style="color:#c3caae;">${node.explanation}</div>
        </div>
      </div>
    `;
    setTimeout(() => {
      state.r2ActiveQuestion = null;
      state.r2JustUnlocked = nodeId;
      const allCorrect = Object.values(state.r2NodesCorrect).every(v => v);
      if (allCorrect) {
        r2TriggerChainActivation();
      } else {
        r2Render();
        // Scroll back so user sees the chain animate
        setTimeout(() => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 100);
        // Clear the just-unlocked flag after the animation completes
        setTimeout(() => {
          state.r2JustUnlocked = null;
          if (state.r2Stage === 'chain') r2Render();
        }, 1800);
      }
    }, 2200);
  } else {
    playSound('error');
    state.errors++;
    state.r2QuestionAttempts[nodeId]++;
    fb.innerHTML = `
      <div class="animate-shake p-3 rounded-lg flex items-start gap-2 mt-2" style="background:rgba(255,180,171,0.12);border:1px solid rgba(255,180,171,0.4);color:#ffb4ab;">
        <span class="material-symbols-outlined filled flex-shrink-0">error</span>
        <div class="text-sm md:text-base"><span class="font-bold">לא מדויק.</span> חשבו לוגית: מה קורה כשהטמפרטורה עולה? מה המשך הטבעי בתהליך?</div>
      </div>
    `;
  }
}

// === CHAIN ACTIVATION TRANSITION ===
function r2TriggerChainActivation() {
  state.r2Stage = 'transition';
  playSound('roomComplete');
  r2Render();
  // After dramatic visualization, advance to console stage
  setTimeout(() => {
    state.r2Stage = 'console';
    r2Render();
  }, 2800);
}

          <div class="flex items-center justify-between mb-2">
            <div class="text-xs md:text-sm flex items-center gap-1.5" style="color:#c3caae;">

            </div>
            <div class="font-mono font-bold text-sm md:text-base" dir="ltr" style="color:${overBudget ? '#ffb4ab' : '#e1e4d1'};">

            <div class="text-xs md:text-sm flex items-center gap-1.5" style="color:#c3caae;">
              <span class="material-symbols-outlined text-base">eco</span>השפעה
            </div>

          </div>
          <div class="text-[10px] mt-1" style="color:#8d947b;">דרוש: ${R2_REQUIRED_IMPACT}% להצלת החוף</div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 mb-4">
        ${r2Actions.map(a => {
          const active = state.r2Actions[a.id];
          return `

            </div>
          </div>
          <button onclick="r2Submit()" class="w-full px-6 md:px-8 py-3 md:py-4 eco-gradient font-bold rounded-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 text-base md:text-lg" style="color:#445e00;">

            <span class="material-symbols-outlined filled text-2xl" style="color:#ffb4ab;">warning</span>

              <span class="font-bold">חריגה מהתקציב.</span> בטלו פעולה אחת והחליפו אותה בשילוב חסכוני יותר.
            </div>

            </div>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function r2ToggleAction(actionId) {
  const wasSaved = r2GetCurrentImpact() >= R2_REQUIRED_IMPACT && r2GetUsedBudget() <= R2_BUDGET;
  state.r2Actions[actionId] = !state.r2Actions[actionId];
  playSound(state.r2Actions[actionId] ? 'pickup' : 'click');
  r2Render();
  // Play victory sound when beach JUST got saved
  const isSaved = r2GetCurrentImpact() >= R2_REQUIRED_IMPACT && r2GetUsedBudget() <= R2_BUDGET;
  if (isSaved && !wasSaved) {
    setTimeout(() => playSound('success'), 200);
    setTimeout(() => playSound('roomComplete'), 700);
  }
}

// === MAIN RENDER ===

            <p class="text-sm md:text-base leading-relaxed" style="color:#e1e4d1;">
              למטה תראו <span class="font-bold" style="color:#bffb33;">שרשרת של 5 שלבים</span> שמסבירה איך פליטות הופכות להצפת חוף.
              <span class="font-bold" style="color:#ffb4ab;">3 שלבים חסרים</span> - מסומנים ב-❓.

            </p>
          </div>
        </div>
        <div class="flex items-center gap-3 pt-2 border-t" style="border-color:rgba(118,212,234,0.2);">
          <div class="flex-1">
            <div class="flex items-center justify-between mb-1.5 text-xs" style="color:#c3caae;">
              <span>התקדמות בשרשרת</span>
              <span class="font-mono font-bold" dir="ltr" style="color:#bffb33;">${filled} / 3</span>
            </div>

            <div class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full animate-pulse" style="background:rgba(255,180,171,0.12);color:#ffb4ab;border:1px solid rgba(255,180,171,0.4);">

  }

  document.getElementById('screenContainer').innerHTML = `
    <div class="animate-fadeIn max-w-5xl mx-auto">
      ${r2RoomHeader()}

      <div class="glass-panel rounded-xl p-4 md:p-5 mb-4">

}

function renderRoom2() {
  state.r2Stage = 'chain';
  state.r2NodesCorrect = { 2: false, 3: false, 4: false };
  state.r2ActiveQuestion = null;
  state.r2QuestionAttempts = { 2: 0, 3: 0, 4: 0 };
  state.r2Actions = { renewable: false, trees: false, electric: false };

function r2Submit() {
  playSound('success');
  state.roomsCompleted[1] = true;
  setTimeout(() => transition('room3', 'נכנסים לחדר 3...'), 600);
}

function r3GetTotals() {
  const co2 = state.r3Plate.reduce((s, f) => s + f.co2, 0);
  const nut = state.r3Plate.reduce((s, f) => s + f.nutrition, 0);
  const variety = state.r3Plate.length;
  return { co2, nut, variety };
}

  const varPct = Math.min(100, (variety / R3_MIN_VARIETY) * 100);

function r3AddFood(id) {
  if (state.r3Plate.find(p => p.id === id)) return;
  const food = r3Foods.find(f => f.id === id);
  state.r3Plate.push(food);
  playSound('drop');
  r3UpdateUI();
}

function r3RemoveFood(id) {
  state.r3Plate = state.r3Plate.filter(p => p.id !== id);
  playSound('click');
  r3UpdateUI();
}

  state.r3Plate = [];
  playSound('click');
  r3UpdateUI();
  document.getElementById('r3Feedback').innerHTML = '';
}

  document.getElementById('r3Meters').innerHTML = r3MetersHTML();

function r3Submit() {
  const fb = document.getElementById('r3Feedback');
  const { co2, nut, variety } = r3GetTotals();

  if (variety === 0) {
    fb.innerHTML = '<div class="p-3 rounded-lg flex items-center gap-2" style="background:rgba(255,180,171,0.15);color:#ffb4ab;"><span class="material-symbols-outlined">info</span><span>הצלחת ריקה. הוסיפו פריטי מזון.</span></div>';
    return;
  }

  const co2Ok = co2 <= R3_MAX_CO2;
  const nutOk = nut >= R3_MIN_NUTRITION;
  const varOk = variety >= R3_MIN_VARIETY;

  if (co2Ok && nutOk && varOk) {
    playSound('success');
    fb.innerHTML = `
      <div class="animate-success glass-strong rounded-xl p-4 md:p-5 mb-3 border-2" style="border-color:#bffb33;background:rgba(191,251,51,0.08);">

            </div>
            <p class="text-xs md:text-sm" style="color:#c3caae;">בארוחה מהצומח ומקומית כמו שלכם, מצמצמים פליטה של כ-25 ק״ג CO₂ ביום ביחס לארוחה אופיינית - שווה ערך לנסיעה של 125 ק״מ ברכב.</p>
          </div>
        </div>
      </div>
    `;
    state.roomsCompleted[2] = true;
    document.getElementById('r3SubmitBtn').style.display = 'none';
    document.getElementById('r3ResetBtn').style.display = 'none';
    // Insert continue button after feedback
    const cont = document.createElement('button');
    cont.onclick = function() { transition('room4', 'נכנסים לחדר 4...'); };
    cont.className = 'w-full mt-3 px-6 py-3 md:py-4 eco-gradient font-bold rounded-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 text-base md:text-lg glow-strong animate-scaleIn';
    cont.style.color = '#445e00';

    fb.parentNode.insertBefore(cont, fb.nextSibling);
  } else {
    state.errors++;
    playSound('error');
    let issues = [];
    if (!co2Ok) issues.push(`<span style="color:#ffb4ab;">✗ פליטות גבוהות מדי (${co2.toFixed(1)}/${R3_MAX_CO2} ק״ג)</span> - החליפו פריטים מן החי בפריטים מהצומח`);
    if (!nutOk) issues.push(`<span style="color:#ffb4ab;">✗ ערך תזונתי נמוך (${nut}/${R3_MIN_NUTRITION})</span> - הוסיפו עוד קטניות, ירקות או דגנים`);
    if (!varOk) issues.push(`<span style="color:#ffb4ab;">✗ חסר גיוון (${variety}/${R3_MIN_VARIETY} פריטים)</span> - הוסיפו עוד סוגי מזון`);

  }
}

function r4GridHTML() {
  return state.r4Cells.map(c => {
    const color = r4CellColor(c.status);
    const dropletIcon = c.status === 'irrigated' ? '<span class="material-symbols-outlined filled text-base mt-1" style="color:#76d4ea;">water_drop</span>' : '';
    return `
      <div onclick="r4ClickCell('${c.id}')" class="tile-cell aspect-square rounded-xl border-2 flex flex-col items-center justify-center relative ${c.status === 'irrigated' ? 'animate-pulse-glow' : ''}"
           style="background:${color.bg};border-color:${color.border};color:${color.text};">
        <span class="absolute top-1 right-1 font-mono text-[9px] md:text-[10px] opacity-70" dir="ltr">${c.id}</span>
        <span class="font-mono font-bold text-xl md:text-3xl" dir="ltr">${c.val}%</span>
        ${dropletIcon}
      </div>
    `;
  }).join('');
}

function r4ClickCell(id) {
  const cell = state.r4Cells.find(c => c.id === id);
  if (!cell || cell.status === 'irrigated') return;

  const fb = document.getElementById('r4Stage1Feedback');
  if (cell.status === 'danger') {
    cell.val = 75;
    cell.status = 'irrigated';
    playSound('water');
    document.getElementById('r4Grid').innerHTML = r4GridHTML();
    const irrigatedCount = state.r4Cells.filter(c => c.status === 'irrigated').length;
    document.getElementById('r4WaterCount').textContent = irrigatedCount;
    if (irrigatedCount === 2) {
      document.getElementById('r4WaterMsg').textContent = '🎉 כל החלקות הקריטיות הושקו!';
      fb.innerHTML = '<div class="p-3 rounded-lg flex items-start gap-2" style="background:rgba(118,212,234,0.15);color:#76d4ea;"><span class="material-symbols-outlined filled text-base">check_circle</span><span class="text-xs md:text-sm">✓ חלקה ' + id + ' הושקתה בהצלחה!</span></div>';
      setTimeout(() => {
        playSound('roomComplete');
        state.r4Stage = 2;
        document.getElementById('r4StageDot2').style.background = '#bffb33';
        document.getElementById('r4StageLabel').innerHTML = 'שלב <span>2</span>/<span>2</span>';

// Acceptable ranges - not too tight, not too loose
// Conventional water (real-world: ~1000): accept 900-1100
// Precision water (real-world: ~350): accept 280-400
const R4_CONV_TARGET = 1000;
const R4_CONV_RANGE = [900, 1100];
const R4_PREC_TARGET = 350;
const R4_PREC_RANGE = [280, 400];

function r4UpdateSlider() {
  state.r4Conventional = parseInt(document.getElementById('r4ConvSlider').value);
  state.r4Precision = parseInt(document.getElementById('r4PrecSlider').value);
  const saving = (state.r4Conventional - state.r4Precision) * 5000;
  document.getElementById('r4ConvVal').textContent = state.r4Conventional.toLocaleString();
  document.getElementById('r4PrecVal').textContent = state.r4Precision.toLocaleString();
  document.getElementById('r4Eq1').textContent = state.r4Conventional;
  document.getElementById('r4Eq2').textContent = state.r4Precision;
  document.getElementById('r4EqResult').textContent = saving.toLocaleString();
  document.getElementById('r4Saving').textContent = saving.toLocaleString();

  // Conventional hints
  const convHint = document.getElementById('r4ConvHint');
  if (state.r4Conventional < R4_CONV_RANGE[0]) {
    convHint.innerHTML = '<span style="color:#ffa62b;">⬆ חקלאות רגילה משתמשת בהרבה יותר מים - העלו את הערך</span>';
  } else if (state.r4Conventional > R4_CONV_RANGE[1]) {
    convHint.innerHTML = '<span style="color:#ffa62b;">⬇ זה גבוה מדי - הערך הריאלי קצת נמוך יותר</span>';
  } else {
    convHint.innerHTML = '<span style="color:#bffb33;">✓ ערך הגיוני לחקלאות קונבנציונלית</span>';
  }

  // Precision hints
  const precHint = document.getElementById('r4PrecHint');
  if (state.r4Precision > R4_PREC_RANGE[1]) {
    precHint.innerHTML = '<span style="color:#ffa62b;">⬇ חקלאות מדייקת חוסכת הרבה יותר - הקטינו את הערך</span>';
  } else if (state.r4Precision < R4_PREC_RANGE[0]) {
    precHint.innerHTML = '<span style="color:#ffa62b;">⬆ זה נמוך מדי, הצמחים זקוקים לכמות מינימלית של מים</span>';
  } else {
    precHint.innerHTML = '<span style="color:#bffb33;">✓ ערך הגיוני לחקלאות מדייקת</span>';
  }

  const inRange = (state.r4Conventional >= R4_CONV_RANGE[0] && state.r4Conventional <= R4_CONV_RANGE[1]) &&
                  (state.r4Precision >= R4_PREC_RANGE[0] && state.r4Precision <= R4_PREC_RANGE[1]);
  document.getElementById('r4Saving').style.color = inRange ? '#bffb33' : (saving > 0 ? '#76d4ea' : '#ffb4ab');
  document.getElementById('r4SavingMsg').style.display = inRange ? 'block' : 'none';
}

function r4CheckStage2() {
  const fb = document.getElementById('r4Stage2Feedback');
  const convOk = state.r4Conventional >= R4_CONV_RANGE[0] && state.r4Conventional <= R4_CONV_RANGE[1];
  const precOk = state.r4Precision >= R4_PREC_RANGE[0] && state.r4Precision <= R4_PREC_RANGE[1];

  if (!convOk && !precOk) {
    state.errors++;
    playSound('error');
    fb.innerHTML = '<div class="animate-shake glass-panel p-3 rounded-lg flex items-start gap-2" style="background:rgba(255,180,171,0.12);color:#ffb4ab;border:1px solid rgba(255,180,171,0.4);"><span class="material-symbols-outlined filled">error</span><div class="text-sm">שני הערכים לא בטווח. הסתכלו על הרמזים מתחת לכל סליידר ונסו שוב.</div></div>';
    return;
  }
  if (!convOk) {
    state.errors++;
    playSound('error');
    fb.innerHTML = '<div class="animate-shake glass-panel p-3 rounded-lg flex items-start gap-2" style="background:rgba(255,180,171,0.12);color:#ffb4ab;border:1px solid rgba(255,180,171,0.4);"><span class="material-symbols-outlined filled">error</span><div class="text-sm">החקלאות הקונבנציונלית לא בטווח. הסתכלו על הרמז מתחת לסליידר.</div></div>';
    return;
  }
  if (!precOk) {
    state.errors++;
    playSound('error');
    fb.innerHTML = '<div class="animate-shake glass-panel p-3 rounded-lg flex items-start gap-2" style="background:rgba(255,180,171,0.12);color:#ffb4ab;border:1px solid rgba(255,180,171,0.4);"><span class="material-symbols-outlined filled">error</span><div class="text-sm">החקלאות המדייקת לא בטווח. הסתכלו על הרמז מתחת לסליידר.</div></div>';
    return;
  }
  playSound('success');
  const saving = (state.r4Conventional - state.r4Precision) * 5000;
  fb.innerHTML = '<div class="animate-success glass-strong p-4 rounded-lg flex items-start gap-3 border-2" style="background:rgba(191,251,51,0.08);color:#bffb33;border-color:#bffb33;"><span class="material-symbols-outlined filled text-2xl">check_circle</span><div><div class="font-bold text-base">מעולה! מצאתם את הטווח הנכון</div><div class="text-sm" style="color:#e1e4d1;">חקלאות מדייקת חוסכת כ-<span class="font-mono font-bold" dir="ltr" style="color:#bffb33;">' + saving.toLocaleString() + ' ליטר</span> ביום במטע אחד של כפר גלים.</div></div></div>';
  state.roomsCompleted[3] = true;
  // Hide validate button, show continue button
  const validateBtn = document.querySelector('button[onclick="r4CheckStage2()"]');
  if (validateBtn) validateBtn.style.display = 'none';
  // Insert continue button after feedback
  const cont = document.createElement('button');
  cont.onclick = function() { transition('room5', 'מתחברים למערכת השליטה הראשית...'); };
  cont.className = 'w-full mt-3 px-6 py-3 md:py-4 eco-gradient font-bold rounded-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 text-base md:text-lg glow-strong animate-scaleIn';
  cont.style.color = '#445e00';
  cont.innerHTML = '<span>המשך לחדר הבא</span><span class="material-symbols-outlined filled">arrow_back</span>';
  fb.parentNode.insertBefore(cont, fb.nextSibling);
}

function r5Activate(id) {
  if (state.r5Activated.includes(id)) return;
  state.r5Activated.push(id);
  playSound('water');

  // Add particles
  const particlesContainer = document.getElementById('r5Particles');
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'heal-particle';
    p.style.left = (Math.random() * 100) + '%';
    p.style.top = (Math.random() * 100) + '%';
    p.style.animationDelay = (i * 0.05) + 's';
    particlesContainer.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }

  // Update health
  const healthLevel = (state.r5Activated.length / 4) * 100;
  document.getElementById('r5EarthDamaged').style.opacity = (1 - healthLevel / 100);
  document.getElementById('r5EarthHealthy').style.opacity = (healthLevel / 100);
  document.getElementById('r5HealthFill').style.width = healthLevel + '%';
  document.getElementById('r5HealthVal').textContent = Math.round(healthLevel) + '%';
  document.getElementById('r5HealthVal').style.color = healthLevel === 100 ? '#bffb33' : '#76d4ea';
  document.getElementById('r5ModuleCount').textContent = state.r5Activated.length + ' / 4';
  document.getElementById('r5ModuleCount').style.color = state.r5Activated.length === 4 ? '#bffb33' : '#e1e4d1';

  if (state.r5Activated.length === 0) {
    document.getElementById('r5SystemStatus').textContent = '⏳ ממתין להפעלת מודולים';
    document.getElementById('r5Status').textContent = 'EARTH STATUS: CRITICAL';

  document.getElementById('r5Modules').innerHTML = r5ModulesHTML();

  if (state.r5Activated.length === 4) {
    state.roomsCompleted[4] = true;

    setTimeout(() => transition('victory', 'משימה הושלמה! 🌍'), 3500);

function downloadCertificate() {
  const cert = document.getElementById('certificateContent');
  const status = document.getElementById('certDownloadStatus');
  const btn = document.getElementById('downloadBtn');
  if (!cert || typeof html2canvas === 'undefined') {
    status.textContent = 'ספריית html2canvas לא נטענה - ודאו חיבור לאינטרנט';
    status.style.color = '#ffb4ab';
    return;
  }
  status.textContent = '⏳ מכין את התעודה...';
  btn.disabled = true;
  btn.style.opacity = '0.6';
  html2canvas(cert, {
    backgroundColor: '#111509',
    scale: 2,
    logging: false,
    useCORS: true
  }).then(function(canvas) {
    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const safeClass = (state.className || 'kfargalim').replace(/[^a-zA-Z0-9]/g, '_');
      link.download = 'certificate_' + safeClass + '.png';
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
      playSound('success');
      status.textContent = '✅ התעודה ירדה בהצלחה! עכשיו תוכלו להתחיל מחדש';
      status.style.color = '#bffb33';
      btn.disabled = false;
      btn.style.opacity = '1';
      const rBtn = document.getElementById('restartBtn');
      if (rBtn) rBtn.style.display = 'flex';
    }, 'image/png');
  }).catch(function(err) {
    console.error(err);
    status.textContent = 'אירעה שגיאה בהורדה - נסו שוב';
    status.style.color = '#ffb4ab';
    btn.disabled = false;
    btn.style.opacity = '1';
  });
}
